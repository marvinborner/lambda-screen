<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Lambda Screen - Gallery</title>
    <link rel="stylesheet" href="style.css" type="text/css" media="all" />
    <style>
      body,
      html {
        font-family: sans-serif;
      }
      h1 {
        text-align: center;
      }
      .gallery {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
        width: 90vw;
        margin: 16px auto;
      }
      @media (max-width: 1000px) {
        .gallery {
          grid-template-columns: 1fr 1fr !important;
        }
      }
      @media (max-width: 600px) {
        .gallery {
          grid-template-columns: 1fr !important;
        }
      }
      .gallery-item {
        cursor: pointer;
      }
      .gallery-item canvas {
        width: 100%;
        aspect-ratio: 1;
        border: 1px solid black;
        background-color: white;
        display: block;
      }
      .gallery-item .label {
        text-align: center;
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Lambda Screen</h1>
    <span id="error" hidden></span>
    <div class="gallery" id="gallery"></div>
    <script src="main.js"></script>
    <script>
      const galleryQueue = [];
      let galleryBusy = false;

      let useWebGL = true;
      const params = new URL(window.location.href);
      if (params.searchParams.has("webgl"))
        useWebGL = params.searchParams.get("webgl") == "true";

      let SIZE = 500;
      const isSmallScreen = matchMedia("(max-width: 700px)").matches;
      if (isSmallScreen && !params.searchParams.has("webgl")) {
        useWebGL = false;
        SIZE = 400;
        console.log(
          "detected phone, falling back to Canvas with SIZE=300. Reload with ?webgl=true to still try webgl.",
        );
      }

      const scheduleGalleryJob = (job) => {
        galleryQueue.push(job);
        runGalleryQueue();
      };

      const runGalleryQueue = () => {
        if (galleryBusy || galleryQueue.length === 0) return;
        galleryBusy = true;
        const job = galleryQueue.shift();
        const finish = () => {
          galleryBusy = false;
          setTimeout(runGalleryQueue, 0);
        };
        const run = () => {
          try {
            const result = job();
            if (result && typeof result.then === "function") {
              result.then(finish, finish);
            } else {
              finish();
            }
          } catch (e) {
            console.error(e);
            finish();
          }
        };

        if ("requestIdleCallback" in window) {
          requestIdleCallback(run, { timeout: 500 });
        } else {
          setTimeout(run, 0);
        }
      };

      const renderGalleryPreset = (canvas, preset) =>
        new Promise((resolve) => {
          const worker = createSnapshotWorker(canvas, useWebGL, resolve);

          const root = { x: [0, SIZE], y: [0, SIZE] };
          canceled = false;
          try {
            reduceLoop(
              {
                worker,
                root,
                logger: () => {},
                schedulerMode: "lifo",
                caching: true,
              },
              app(parse(preset.term))(
                parse("\\((((0 \\\\1) \\\\1) \\\\1) \\\\1)"),
              ),
            );
            worker.postMessage({ flush: true });
          } catch (e) {
            console.error(preset.name, e);
            worker.terminate();
            resolve();
          }
        });

      if (params.searchParams.has("term")) {
        window.location.href =
          "render.html?term=" + params.searchParams.get("term");
      }

      fetch("presets.json")
        .then((r) => r.json())
        .then((presets) => {
          presets.forEach((preset) => {
            const item = document.createElement("div");
            item.className = "gallery-item";

            const canvas = document.createElement("canvas");
            canvas.width = SIZE;
            canvas.height = SIZE;

            const label = document.createElement("div");
            label.className = "label";
            label.textContent = preset.name;

            item.appendChild(canvas);
            item.appendChild(label);
            item.addEventListener("click", () => {
              window.location.href =
                "render.html?preset=" + encodeURIComponent(preset.term);
            });
            gallery.appendChild(item);

            let rendered = false;
            const renderWhenVisible = (entries) => {
              if (rendered || !entries[0].isIntersecting) return;
              rendered = true;
              if (observer) observer.disconnect();

              scheduleGalleryJob(() => renderGalleryPreset(canvas, preset));
            };

            const observer =
              "IntersectionObserver" in window
                ? new IntersectionObserver(renderWhenVisible, {
                    threshold: 0.1,
                  })
                : null;
            if (observer) {
              observer.observe(item);
            } else {
              renderWhenVisible([{ isIntersecting: true }]);
            }
          });
        });
    </script>
  </body>
</html>
