<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Lambda Screen - Gallery</title>
    <link rel="stylesheet" href="style.css" type="text/css" media="all" />
    <style>
      body,
      html {
        font-family: sans-serif;
      }
      h1 {
        text-align: center;
      }
      .gallery {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
        width: 90vw;
        margin: 16px auto;
      }
      @media (max-width: 1000px) {
        .gallery {
          grid-template-columns: 1fr 1fr !important;
        }
      }
      @media (max-width: 600px) {
        .gallery {
          grid-template-columns: 1fr !important;
        }
      }
      .gallery-item {
        cursor: pointer;
      }
      .gallery-item canvas {
        width: 100%;
        aspect-ratio: 1;
        border: 1px solid black;
        background-color: white;
        display: block;
      }
      .gallery-item .label {
        text-align: center;
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Lambda Screen</h1>
    <span id="error" hidden></span>
    <div class="gallery" id="gallery"></div>
    <script src="main.js"></script>
    <script>
      const SIZE = 500;

      const params = new URL(window.location.href);
      if (params.searchParams.has("term")) {
        window.location.href =
          "render.html?term=" + params.searchParams.get("term");
      }

      fetch("presets.json")
        .then((r) => r.json())
        .then((presets) => {
          presets.forEach((preset) => {
            const item = document.createElement("div");
            item.className = "gallery-item";

            const canvas = document.createElement("canvas");
            canvas.width = SIZE;
            canvas.height = SIZE;

            const label = document.createElement("div");
            label.className = "label";
            label.textContent = preset.name;

            item.appendChild(canvas);
            item.appendChild(label);
            item.addEventListener("click", () => {
              window.location.href =
                "render.html?preset=" + encodeURIComponent(preset.term);
            });
            gallery.appendChild(item);

            let rendered = false;
            const observer = new IntersectionObserver(
              (entries) => {
                if (rendered || !entries[0].isIntersecting) return;
                rendered = true;
                observer.disconnect();

                const offscreen = canvas.transferControlToOffscreen();
                const worker = new Worker("canvasWorker.js");
                worker.postMessage({ canvas: offscreen, useWebGL: true }, [
                  offscreen,
                ]);

                const root = { x: [0, SIZE], y: [0, SIZE] };
                canceled = false;
                clearCache();
                try {
                  reduceLoop(
                    {
                      worker,
                      root,
                      logger: () => {},
                      scheduler: (stack) => stack.shift(),
                      caching: true,
                    },
                    app(parse(preset.term))(
                      parse("\\((((0 \\\\1) \\\\1) \\\\1) \\\\1)"),
                    ),
                  );
                } catch (e) {
                  console.error(preset.name, e);
                }
              },
              { threshold: 0.1 },
            );
            observer.observe(item);
          });
        });
    </script>
  </body>
</html>
